name: Deploy Backend

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || { echo "Missing required secret: SSH_HOST" >&2; exit 1; }
          test -n "${{ secrets.SSH_USER }}" || { echo "Missing required secret: SSH_USER" >&2; exit 1; }
          test -n "${{ secrets.SSH_PASSWORD }}" || { echo "Missing required secret: SSH_PASSWORD" >&2; exit 1; }
          test -n "${{ secrets.BACKEND_ENV_FILE }}" || { echo "Missing required secret: BACKEND_ENV_FILE" >&2; exit 1; }

      - name: Resolve Backend Source Directory
        run: |
          if [ -f backend/package.json ]; then
            echo "BACKEND_SOURCE=backend" >> "$GITHUB_ENV"
          elif [ -f package.json ]; then
            echo "BACKEND_SOURCE=." >> "$GITHUB_ENV"
          else
            echo "Could not find backend/package.json or package.json" >&2
            exit 1
          fi

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Preflight VM Sync Requirements
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p /var/www/fresco/backend
            if ! command -v rsync >/dev/null 2>&1; then
              echo "rsync is not installed on VM. Install it once: sudo apt-get update && sudo apt-get install -y rsync" >&2
              exit 1
            fi

      - name: Sync Backend Files to VPS
        run: |
          # Sync everything except node_modules and ignore .env from git to be safe
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete --exclude 'node_modules/' --exclude '.env' -e "ssh -o StrictHostKeyChecking=no" "${BACKEND_SOURCE}/" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/fresco/backend/

      - name: Setup Backend Environment & Zero-Downtime Reload
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/fresco/backend
            # Backward compatibility in case older sync created /backend/backend layout
            if [ -f backend/package.json ]; then
              cd backend
            fi

            # Safely create the non-git .env file directly on the VM
            echo "${{ secrets.BACKEND_ENV_FILE }}" > .env
            npm install --omit=dev

            # Prefer PM2 ecosystem when available, fallback to direct server.js startup.
            if [ -f ecosystem.config.js ]; then
              pm2 reload fresco-backend || pm2 start ecosystem.config.js --only fresco-backend --env production
            else
              pm2 reload fresco-backend || pm2 start server.js --name "fresco-backend" -i max --env production
            fi
            pm2 save
