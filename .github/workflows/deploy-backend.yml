name: Deploy Backend

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Required Secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || { echo "Missing required secret: SSH_HOST" >&2; exit 1; }
          test -n "${{ secrets.SSH_USER }}" || { echo "Missing required secret: SSH_USER" >&2; exit 1; }
          test -n "${{ secrets.SSH_PASSWORD }}" || { echo "Missing required secret: SSH_PASSWORD" >&2; exit 1; }
          test -n "${{ secrets.BACKEND_ENV_FILE }}" || { echo "Missing required secret: BACKEND_ENV_FILE" >&2; exit 1; }

      - name: Deploy Backend On VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            fi

            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              echo "Node.js/npm missing on VM. Install Node 20 and rerun workflow." >&2
              exit 1
            fi

            mkdir -p /var/www/fresco/backend

            BUILD_DIR="$(mktemp -d /tmp/fresco-backend-XXXXXX)"
            cleanup() {
              rm -rf "$BUILD_DIR"
            }
            trap cleanup EXIT

            git clone --depth 1 --branch main https://github.com/veeru2005/fresco-backend.git "$BUILD_DIR"

            # Keep runtime directory clean and copy only application files.
            find /var/www/fresco/backend -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar -C "$BUILD_DIR" --exclude='.git' --exclude='.github' --exclude='.env' --exclude='.DS_Store' -cf - . | tar -xf - -C /var/www/fresco/backend

            cd /var/www/fresco/backend

            # Safely create the non-git .env file directly on the VM
            echo "${{ secrets.BACKEND_ENV_FILE }}" > .env
            chmod 600 .env

            if [ -f package-lock.json ]; then
              npm ci --omit=dev
            else
              npm install --omit=dev
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            # Prefer PM2 ecosystem when available, fallback to direct server.js startup.
            if [ -f ecosystem.config.js ]; then
              pm2 reload fresco-backend || pm2 start ecosystem.config.js --only fresco-backend --env production
            else
              pm2 reload fresco-backend || pm2 start server.js --name "fresco-backend" -i max --env production
            fi
            pm2 save
